<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZDNAM - LOCKET GOLD VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; }
        .gold-glow { box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); border: 1px solid rgba(251, 191, 36, 0.3); }
        .btn-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); transition: all 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(217, 119, 6, 0.4); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#161b2b] rounded-3xl p-8 gold-glow relative">
        <div class="text-center mb-8">
            <div class="bg-yellow-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-bolt-lightning text-3xl text-yellow-500"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">ZDNAM <span class="text-yellow-500">Locket Gold</span></h1>
            <p class="text-gray-400 text-xs mt-1 uppercase tracking-widest">Dữ liệu thời gian thực v3.0</p>
        </div>

        <div id="searchBox" class="space-y-5">
            <div>
                <label class="text-[10px] font-bold text-yellow-500 uppercase ml-1">Tên người dùng Locket</label>
                <input type="text" id="targetUser" class="w-full mt-2 bg-[#0b0f1a] border border-gray-800 rounded-2xl py-4 px-5 text-white focus:outline-none focus:border-yellow-500 transition-all" placeholder="Ví dụ: zdnam.active">
            </div>
            <button onclick="fetchData()" id="btnAction" class="w-full btn-gold text-black font-bold py-4 rounded-2xl uppercase text-sm tracking-widest">
                Tìm kiếm dữ liệu
            </button>
        </div>

        <div id="resultBox" class="hidden text-center space-y-6 animate-pulse">
            <div id="loadingStatus" class="flex flex-col items-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-yellow-500 mb-3"></div>
                <p class="text-gray-400 text-sm" id="processText">Đang truy vấn Server...</p>
            </div>

            <div id="userData" class="hidden">
                <div class="relative inline-block">
                    <img id="avatar" class="w-24 h-24 rounded-full border-4 border-yellow-500 mx-auto object-cover" src="" alt="Avatar">
                    <div class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-4 border-[#161b2b]"></div>
                </div>
                <h2 id="fullName" class="text-xl font-bold mt-4 text-white"></h2>
                <p id="userName" class="text-yellow-500 text-sm"></p>
                
                <div class="mt-6 p-4 bg-red-500/10 border border-red-500/30 rounded-2xl">
                    <p class="text-red-500 text-xs font-bold uppercase tracking-tighter">Trạng thái: Chưa kích hoạt Gold</p>
                </div>

                <a href="https://zalo.me/0964121544" target="_blank" class="block w-full bg-[#0068ff] text-white font-bold py-4 rounded-2xl mt-6 hover:bg-[#0056d2] transition-all">
                    <i class="fa-solid fa-comment-dots mr-2"></i> NHẮN ZALO ĐỂ MUA GOLD
                </a>
            </div>
        </div>

        <p class="text-center text-[9px] text-gray-600 mt-10 uppercase tracking-widest">Powered by ZDNAM Service</p>
    </div>

    <script>
        async function fetchData() {
            const user = document.getElementById('targetUser').value.trim();
            if (!user) return alert("Vui lòng nhập ID!");

            // Giao diện lúc đang tìm
            document.getElementById('searchBox').classList.add('hidden');
            document.getElementById('resultBox').classList.remove('hidden');
            const processText = document.getElementById('processText');

            try {
                // Kỹ thuật Proxy để lấy dữ liệu ngầm từ tienich.space
                const proxy = "https://api.allorigins.win/get?url=";
                const target = encodeURIComponent(`https://tienich.space/locket2.php?user=${user}`);
                
                const response = await fetch(proxy + target);
                const data = await response.json();
                
                // Đọc dữ liệu từ mã HTML của web gốc
                const parser = new DOMParser();
                const htmlDoc = parser.parseFromString(data.contents, 'text/html');
                
                // Lấy ảnh đại diện và tên từ các thẻ của web gốc
                const imgTag = htmlDoc.querySelector('img[src*="locket"]');
                const nameTag = htmlDoc.querySelector('h2, h3, b');

                if (!imgTag) throw new Error("Không tìm thấy");

                // Hiển thị kết quả thật
                setTimeout(() => {
                    document.getElementById('loadingStatus').classList.add('hidden');
                    document.getElementById('userData').classList.remove('hidden');
                    document.getElementById('resultBox').classList.remove('animate-pulse');
                    
                    document.getElementById('avatar').src = imgTag.src;
                    document.getElementById('fullName').innerText = nameTag ? nameTag.innerText : "Người dùng Locket";
                    document.getElementById('userName').innerText = "@" + user;
                }, 2000);

            } catch (error) {
                // Nếu lỗi hoặc không tìm thấy, báo bảo trì để giữ uy tín
                processText.innerHTML = `
                    <i class="fa-solid fa-circle-xmark text-red-500 text-3xl mb-2"></i><br>
                    ID không tồn tại hoặc lỗi Server.<br>
                    <a href="https://zalo.me/0964121544" class="text-yellow-500 font-bold underline mt-2 block">Liên hệ Admin hỗ trợ</a>
                `;
                document.querySelector('.animate-spin').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
