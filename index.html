<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZDNAM - LOCKET GOLD MINI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            /* Hình nền gradient kết hợp với hiệu ứng mạng lưới mờ ảo */
            background: radial-gradient(circle at center, #4c51bf 0%, #0b0f1a 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Khung nhỏ gọn đặt giữa màn hình theo ảnh mẫu */
        .wrapper {
            width: 320px; /* Thu nhỏ bề ngang tối đa */
            height: 500px; /* Chiều cao ngắn lại cực kỳ thanh thoát */
            background: #161b2b;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* Iframe căn chỉnh khớp với khung siêu mini */
        iframe {
            width: 420px;
            height: 750px;
            position: absolute;
            top: -145px; /* Giữ góc căn chuẩn của bạn */
            left: -50px; /* Căn giữa nội dung */
            border: none;
        }

        /* Lớp phủ che header trang gốc */
        .top-cover {
            position: absolute;
            top: 0;
            width: 100%;
            height: 30px;
            background: #161b2b;
            z-index: 5;
        }

        /* Nút chốt đơn Zalo tối giản */
        .footer-action {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            z-index: 10;
        }

        .btn-zalo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(to right, #4c51bf, #3b82f6);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 10px;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-zalo:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="top-cover"></div>
        
        <iframe src="https://tienich.space/locket2.php" scrolling="no"></iframe>

        <div class="footer-action">
            <a href="https://zalo.me/0964121544" target="_blank" class="btn-zalo">
                <i class="fa-solid fa-shield-halved mr-2"></i> NHẤN TIN ZALO HỖ TRỢ
            </a>
        </div>
    </div>

</body>
</html>
