

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locket Gold</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0 !important;
            padding: 25px;
            border: none;
        }
        
        .btn-unlock {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-unlock:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }
        
        .result-card {
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .icon-lg {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
        
        .user-profile-card {
            border-radius: 15px;
            padding: 25px;
            background: white;
            margin-top: 20px;
            border: 2px solid #e0e0e0;
            animation: slideIn 0.5s ease;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .user-info-item {
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .user-info-label {
            font-weight: 600;
            color: #667eea;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .user-info-value {
            font-size: 1.1rem;
            color: #333;
            word-break: break-all;
        }
        
        .btn-confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }
        
        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .btn-cancel {
            background: #6c757d;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }
        
        .btn-cancel:hover {
            background: #5a6268;
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-header text-center">
                        <i class="fas fa-crown icon-lg"></i>
                        <h2 class="mb-0">Locket Gold</h2>
                        <p class="mb-0 mt-2 opacity-75">Unlock Locket Gold VIP</p>
                    </div>
                    
                    <div class="card-body p-4">
                        <!-- Login Status -->
                        <div class="alert alert-info d-flex align-items-center mb-4" role="alert">
                            <i class="fas fa-info-circle me-2"></i>
                            <div>
                                <strong>Status:</strong> Auth successful!.                            </div>
                        </div>
                        
                        <!-- Main Form -->
                        <form id="unlockForm">
                            <div class="mb-4">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user me-2"></i>Tên người dùng
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="username" 
                                    name="username" 
                                    placeholder="Ví dụ tienichspace"
                                    required
                                >
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-unlock" id="unlockBtn">
                                    <i class="fas fa-search me-2"></i>
                                    <span id="btnText">Tìm người dùng</span>
                                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                                </button>
                            </div>
                        </form>
                        
                        <!-- Result Display -->
                        <div id="resultContainer"></div>
                    </div>
                </div>
                
                <!-- Info Card -->
                <div class="card mt-3" style="background: rgba(255, 255, 255, 0.9);">
                    <div class="card-body text-center">
                        <small class="text-muted">
                            <i class="fas fa-shield-alt me-1"></i>
                            &copy; 2024 <a href="https://tienich.space" target="_blank">tienich.space</a> - All rights reserved
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // Initialize particles
        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: '#ffffff' },
                shape: { type: 'circle' },
                opacity: { value: 0.5, random: false },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: '#ffffff',
                    opacity: 0.4,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 2,
                    direction: 'none',
                    random: false,
                    straight: false,
                    out_mode: 'out',
                    bounce: false
                }
            },
            interactivity: {
                detect_on: 'canvas',
                events: {
                    onhover: { enable: true, mode: 'repulse' },
                    onclick: { enable: true, mode: 'push' },
                    resize: true
                }
            },
            retina_detect: true
        });
        
        // Animate card entrance
        anime({
            targets: '.card',
            scale: [0.9, 1],
            opacity: [0, 1],
            duration: 800,
            easing: 'easeOutElastic(1, .6)'
        });
        
        // Form submission
        document.getElementById('unlockForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const btn = document.getElementById('unlockBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultContainer = document.getElementById('resultContainer');
            
            // Disable button and show loading
            btn.disabled = true;
            btnText.textContent = 'Đang tìm kiếm...';
            btnSpinner.classList.remove('d-none');
            resultContainer.innerHTML = '';
            
            try {
                const formData = new FormData();
                formData.append('action', 'get_user');
                formData.append('username', username);
                
                const response = await fetch('', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                // Display user profile
                if (data.success && data.user) {
                    const user = data.user;
                    const fullName = `${user.first_name} ${user.last_name}`.trim();
                    
                    resultContainer.innerHTML = `
                        <div class="user-profile-card" style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%); border: 2px solid rgba(102, 126, 234, 0.3);">
                            <div class="text-center mb-4">
                                <img src="${user.profile_picture_url || 'https://via.placeholder.com/100'}" 
                                     alt="Profile Picture" 
                                     class="profile-avatar"
                                     onerror="this.src='https://via.placeholder.com/100'">
                                <h4 class="mt-3 mb-0">${fullName || 'No Name'}</h4>
                                <p class="text-muted">@${user.username}</p>
                            </div>
                            
                            <div class="user-info-item" style="background: rgba(102, 126, 234, 0.1); border: 1px solid rgba(102, 126, 234, 0.2);">
                                <div class="user-info-label">Full Name</div>
                                <div class="user-info-value">${fullName || 'N/A'}</div>
                            </div>
                            
                            <div class="user-info-item" style="background: rgba(102, 126, 234, 0.1); border: 1px solid rgba(102, 126, 234, 0.2);">
                                <div class="user-info-label">Username</div>
                                <div class="user-info-value">@${user.username}</div>
                            </div>
                            
                            <div class="user-info-item" style="background: rgba(102, 126, 234, 0.1); border: 1px solid rgba(102, 126, 234, 0.2);">
                                <div class="user-info-label">User ID (UID)</div>
                                <div class="user-info-value" style="font-size: 0.9rem;">${user.uid}</div>
                            </div>
                            
                            <div class="row mt-4">
                                <div class="col-6">
                                    <button type="button" class="btn btn-cancel w-100" onclick="cancelUnlock()">
                                        <i class="fas fa-times me-2"></i>Hủy
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button type="button" class="btn btn-confirm w-100" onclick="confirmUnlock('${user.uid}', '${fullName}')">
                                        <i class="fas fa-unlock-alt me-2"></i>Xác nhận
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // Animate profile card
                    anime({
                        targets: '.user-profile-card',
                        scale: [0.8, 1],
                        opacity: [0, 1],
                        duration: 500,
                        easing: 'easeOutBack'
                    });
                    
                    // Animate avatar
                    anime({
                        targets: '.profile-avatar',
                        rotate: [0, 360],
                        duration: 1000,
                        easing: 'easeInOutQuad'
                    });
                } else {
                    resultContainer.innerHTML = `
                        <div class="result-card alert alert-danger">
                            <div class="text-center">
                                <i class="fas fa-user-slash icon-lg text-danger"></i>
                                <h4 class="mb-3">Không tìm thấy người dùng</h4>
                                <p class="mb-0">${data.message}</p>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                resultContainer.innerHTML = `
                    <div class="result-card alert alert-danger">
                        <div class="text-center">
                            <i class="fas fa-exclamation-triangle icon-lg text-danger"></i>
                            <h4 class="mb-3">Lỗi</h4>
                            <p class="mb-0">Đã xảy ra lỗi. Vui lòng thử lại.</p>
                        </div>
                    </div>
                `;
            } finally {
                // Re-enable button
                btn.disabled = false;
                btnText.textContent = 'Tìm người dùng';
                btnSpinner.classList.add('d-none');
            }
        });
        
        // Cancel unlock function
        function cancelUnlock() {
            const resultContainer = document.getElementById('resultContainer');
            
            anime({
                targets: '.user-profile-card',
                opacity: [1, 0],
                scale: [1, 0.8],
                duration: 300,
                easing: 'easeInQuad',
                complete: function() {
                    resultContainer.innerHTML = '';
                    document.getElementById('username').value = '';
                }
            });
        }
        
        // Confirm unlock function
        async function confirmUnlock(uid, fullName) {
            const resultContainer = document.getElementById('resultContainer');
            
            // Show loading state
            resultContainer.innerHTML = `
                <div class="result-card alert alert-info text-center">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5>Đang mở khóa Locket Gold...</h5>
                    <p class="mb-0">Vui lòng đợi trong khi chúng tôi xử lý yêu cầu của bạn</p>
                </div>
            `;
            
            try {
                const formData = new FormData();
                formData.append('action', 'confirm_unlock');
                formData.append('uid', uid);
                
                const response = await fetch('', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                // Display final result
                if (data.success) {
                    // Get username from the input field
                    const username = document.getElementById('username').value;
                    
                    resultContainer.innerHTML = `
                        <div class="result-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none;">
                            <div class="text-center">
                                <i class="fas fa-check-circle icon-lg" style="color: white;"></i>
                                <h4 class="mb-3">🎉 Thành Công!</h4>
                                <p class="mb-3"><strong>Locket Gold đã được mở khóa!</strong></p>
                                <div class="user-info-item" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);">
                                    <div class="user-info-label" style="color: rgba(255,255,255,0.9);">Username</div>
                                    <div class="user-info-value" style="color: white;">@${username}</div>
                                </div>
                                
                                <div class="alert alert-warning mt-4 text-start" style="background: rgba(255,255,255,0.95); border: none;">
                                    <h6 class="mb-3" style="color: #333;"><i class="fas fa-question-circle me-2"></i>Bạn đã nhận được Locket Gold chưa?</h6>
                                    <p class="mb-2" style="color: #555; font-size: 0.9rem;">
                                        <i class="fas fa-times-circle me-2 text-danger"></i>
                                        <strong>Nếu chưa:</strong> Hãy thoát ra vào lại vài lần thử, nếu vẫn không được xin hãy chạy lại.
                                    </p>
                                    <p class="mb-3" style="color: #555; font-size: 0.9rem;">
                                        <i class="fas fa-check-circle me-2 text-success"></i>
                                        <strong>Nếu đã nhận được:</strong> Hãy cài profile này để tránh mất Locket Gold.
                                    </p>
                                    <a href="https://locketgold15s.vercel.app/" target="_blank" class="btn w-100" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600;">
                                        <i class="fab fa-apple me-2"></i>Cài đặt Profile iOS
                                    </a>
                                </div>
                                
                                <button type="button" class="btn btn-light mt-3" onclick="location.reload()" style="border-radius: 50px; padding: 12px 30px; font-weight: 600;">
                                    <i class="fas fa-redo me-2"></i>Mở khóa tài khoản khác
                                </button>
                            </div>
                        </div>
                    `;
                    
                    // Celebrate with animation
                    anime({
                        targets: '.result-card',
                        scale: [0.8, 1],
                        opacity: [0, 1],
                        duration: 500,
                        easing: 'easeOutBack'
                    });
                    
                    // Confetti effect simulation with icons
                    for (let i = 0; i < 10; i++) {
                        setTimeout(() => {
                            const icon = document.createElement('i');
                            icon.className = 'fas fa-star';
                            icon.style.position = 'fixed';
                            icon.style.left = Math.random() * 100 + '%';
                            icon.style.top = '0';
                            icon.style.fontSize = '20px';
                            icon.style.color = '#ffd700';
                            icon.style.zIndex = '9999';
                            document.body.appendChild(icon);
                            
                            anime({
                                targets: icon,
                                translateY: window.innerHeight,
                                rotate: 360 * 5,
                                opacity: [1, 0],
                                duration: 2000,
                                easing: 'easeInQuad',
                                complete: () => icon.remove()
                            });
                        }, i * 100);
                    }
                } else {
                    resultContainer.innerHTML = `
                        <div class="result-card alert alert-danger">
                            <div class="text-center">
                                <i class="fas fa-times-circle icon-lg text-danger"></i>
                                <h4 class="mb-3">Thất bại</h4>
                                <p class="mb-0">${data.message}</p>
                                <button type="button" class="btn btn-secondary mt-3" onclick="location.reload()">
                                    <i class="fas fa-redo me-2"></i>Thử lại
                                </button>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                resultContainer.innerHTML = `
                    <div class="result-card alert alert-danger">
                        <div class="text-center">
                            <i class="fas fa-exclamation-triangle icon-lg text-danger"></i>
                            <h4 class="mb-3">Lỗi</h4>
                            <p class="mb-0">Đã xảy ra lỗi khi mở khóa. Vui lòng thử lại.</p>
                            <button type="button" class="btn btn-secondary mt-3" onclick="location.reload()">
                                <i class="fas fa-redo me-2"></i>Thử lại
                            </button>
                        </div>
                    </div>
                `;
            }
        }
        
        // Input animation
        document.getElementById('username').addEventListener('focus', function() {
            anime({
                targets: this,
                scale: [1, 1.02, 1],
                duration: 300,
                easing: 'easeInOutQuad'
            });
        });
    </script>

</body>
