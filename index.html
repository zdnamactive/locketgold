<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZDNAM - LOCKET MINI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #0b0f1a;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Khung siêu nhỏ gọn */
        .wrapper {
            width: 340px; /* Thu nhỏ thêm nữa */
            height: 520px; /* Cắt ngắn chiều cao */
            background: #161b2b;
            border-radius: 20px;
            border: 1px solid rgba(251, 191, 36, 0.25);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* Iframe điều chỉnh khớp với khung siêu nhỏ */
        iframe {
            width: 450px;
            height: 800px;
            position: absolute;
            top: -145px; /* Nhích lên một chút để khớp khung nhỏ */
            left: -55px; /* Căn lại tâm */
            border: none;
        }

        /* Nút Zalo tối giản */
        .footer-cta {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            z-index: 10;
        }

        .btn-zalo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: #0068ff;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px; /* Chữ nhỏ lại cho tinh tế */
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-zalo:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        /* Lớp phủ chặn các phần thừa của trang gốc */
        .overlay-top { position: absolute; top: 0; width: 100%; height: 35px; background: #161b2b; z-index: 5; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="overlay-top"></div>
        
        <iframe src="https://tienich.space/locket2.php" scrolling="no"></iframe>

        <div class="footer-cta">
            <a href="https://zalo.me/0964121544" target="_blank" class="btn-zalo">
                <i class="fa-solid fa-comment-dots mr-2"></i> HỖ TRỢ QUA ZALO
            </a>
        </div>
    </div>

</body>
</html>
