<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZDNAM - Locket Gold VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .gold-border { border: 2px solid #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        .gold-text { color: #fbbf24; }
        .btn-gold { background: linear-gradient(to right, #fbbf24, #d97706); transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
    </style>
</head>
<body>
    <div class="bg-[#1f2937] p-8 rounded-2xl gold-border w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold gold-text uppercase mb-2">Locket Gold VIP</h1>
            <p class="text-gray-400 text-sm">Hệ thống mở khóa độc quyền bởi ZDNAM</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-gray-300 text-sm mb-2"><i class="fa-solid fa-user mr-2"></i>Tên người dùng Locket</label>
                <input type="text" id="username" placeholder="Nhập username..." class="w-full bg-[#111827] border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-yellow-500">
            </div>

            <button onclick="startSearch()" id="mainBtn" class="w-full btn-gold text-white font-bold py-3 rounded-lg uppercase tracking-wider">
                Tìm kiếm tài khoản
            </button>

            <div id="statusBox" class="hidden mt-6 p-4 rounded-lg bg-[#111827] text-center border border-gray-800">
                <div id="loader" class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-yellow-500 mb-2"></div>
                <p id="statusText" class="text-gray-300 text-sm"></p>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-800 text-center">
            <p class="text-gray-500 text-xs">© 2026 ZDNAM Service - Thiết kế bởi ZDNAM</p>
        </div>
    </div>

    <script>
        function startSearch() {
            const user = document.getElementById('username').value;
            const btn = document.getElementById('mainBtn');
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            const loader = document.getElementById('loader');

            if (!user) {
                alert("Vui lòng nhập tên người dùng!");
                return;
            }

            btn.disabled = true;
            statusBox.classList.remove('hidden');
            statusText.innerText = "Đang kết nối máy chủ...";

            setTimeout(() => {
                statusText.innerText = `Đang tìm kiếm: ${user}...`;
            }, 1500);

            setTimeout(() => {
                loader.classList.add('hidden');
                statusText.innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation text-yellow-500 text-2xl mb-2"></i>
                    <br><span class="font-bold text-white">TÍNH NĂNG BẢO TRÌ</span><br>
                    Hệ thống ZDNAM đang cập nhật phiên bản mới. Vui lòng quay lại sau!
                `;
            }, 4000);
        }
    </script>
</body>
</html>
