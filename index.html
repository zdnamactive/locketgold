    <script>
        async function startCheck() {
            const user = document.getElementById('username').value.trim();
            if (!user) return alert("Vui lòng nhập Username Locket!");

            document.getElementById('searchSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');

            try {
                // Sử dụng Proxy mạnh để bóc tách dữ liệu từ tienich.space
                const proxy = "https://api.allorigins.win/get?url=";
                const target = encodeURIComponent(`https://tienich.space/locket2.php?user=${user}`);
                
                const response = await fetch(proxy + target);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // Lấy ảnh và tên thật của khách hàng
                const avatar = doc.querySelector('img[src*="locket"]');
                const name = doc.querySelector('h2, h3, b');

                if (!avatar) throw new Error("User not found");

                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('profileData').classList.remove('hidden');
                    
                    document.getElementById('userImg').src = avatar.src;
                    document.getElementById('userFullname').innerText = name ? name.innerText : "Thành viên Locket";
                    document.getElementById('userAtName').innerText = "@" + user;
                }, 2000);

            } catch (err) {
                // Nếu lỗi, vẫn hiện giao diện chuyên nghiệp để dẫn khách về Zalo

                        </div>
                    `;
                }, 2000);
