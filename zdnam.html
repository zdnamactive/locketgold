<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZDNAM - Locket Gold VIP</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        
        .card-header {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            color: #000;
            border-radius: 20px 20px 0 0 !important;
            padding: 25px;
            border: none;
        }
        
        .btn-unlock {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 700;
            color: #000;
            transition: all 0.3s;
        }
        
        .btn-unlock:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(241, 196, 15, 0.4);
            color: #000;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            background: rgba(255,255,255,0.15);
            border-color: #f1c40f;
            box-shadow: none;
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .user-profile-card {
            border-radius: 15px;
            padding: 25px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f1c40f;
        }
        
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        a { color: #f1c40f; text-decoration: none; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-header text-center">
                        <i class="fas fa-crown fa-3x mb-3"></i>
                        <h2 class="mb-0">ZDNAM GOLD</h2>
                        <p class="mb-0 mt-2 opacity-75">Hệ thống mở khóa Locket VIP</p>
                    </div>
                    
                    <div class="card-body p-4">
                        <div class="alert alert-warning d-flex align-items-center mb-4" style="background: rgba(241, 196, 15, 0.2); border: none; color: #f1c40f;">
                            <i class="fas fa-bolt me-2"></i>
                            <div>Trạng thái: <strong>Máy chủ ổn định</strong></div>
                        </div>
                        
                        <form id="unlockForm">
                            <div class="mb-4">
                                <label class="form-label"><i class="fas fa-user me-2"></i>Tên người dùng Locket</label>
                                <input type="text" class="form-control" id="username" placeholder="Nhập username của bạn..." required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-unlock" id="unlockBtn">
                                    <span id="btnText">TÌM KIẾM TÀI KHOẢN</span>
                                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                                </button>
                            </div>
                        </form>
                        
                        <div id="resultContainer"></div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <small class="text-white-50">
                        &copy; 2026 <strong>ZDNAM Service</strong> - Thiết kế bởi ZDNAM
                    </small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Cấu hình hạt hiệu ứng nền
        particlesJS('particles-js', {
            particles: {
                number: { value: 50 },
                color: { value: '#f1c40f' },
                shape: { type: 'circle' },
                opacity: { value: 0.3 },
                size: { value: 2 },
                line_linked: { enable: true, distance: 150, color: '#f1c40f', opacity: 0.2, width: 1 },
                move: { enable: true, speed: 2 }
            }
        });

        // Xử lý Form
        document.getElementById('unlockForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const result = document.getElementById('resultContainer');
            
            btnText.textContent = 'ĐANG KIỂM TRA...';
            btnSpinner.classList.remove('d-none');

            // Giả lập quét dữ liệu
            setTimeout(() => {
                btnText.textContent = 'TÌM KIẾM TÀI KHOẢN';
                btnSpinner.classList.add('d-none');
                result.innerHTML = `
                    <div class="user-profile-card text-center">
                        <i class="fas fa-exclamation-triangle fa-2x text-warning mb-3"></i>
                        <h5>Tính năng đang bảo trì</h5>
                        <p class="small opacity-75">Hệ thống ZDNAM đang cập nhật phiên bản mới. Vui lòng quay lại sau!</p>
                    </div>
                `;
            }, 2000);
        });
    </script>
</body>
</html>
